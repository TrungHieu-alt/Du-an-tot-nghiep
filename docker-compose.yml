services:
  mongo:
    image: mongo:7
    container_name: jobmatcher-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: jobmatcher-backend
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      DB_NAME: ${DB_NAME:-job_matching}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MASTODON_API_BASE_URL: ${MASTODON_API_BASE_URL:-}
      MASTODON_ACCESS_TOKEN: ${MASTODON_ACCESS_TOKEN:-}
    volumes:
      - ./backend:/app/backend
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: jobmatcher-frontend
    working_dir: /app/frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  mongo_data:
