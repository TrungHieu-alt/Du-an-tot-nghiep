services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobmatcher-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobmatcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobmatcher}
      POSTGRES_DB: ${POSTGRES_DB:-jobmatcher_v2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobmatcher} -d ${POSTGRES_DB:-jobmatcher_v2}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: jobmatcher-backend
    working_dir: /app/backend
    command: uvicorn jobconnect.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend/src
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-jobmatcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobmatcher}
      POSTGRES_DB: ${POSTGRES_DB:-jobmatcher_v2}
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: jobmatcher-frontend
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
